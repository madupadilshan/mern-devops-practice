<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="980" viewBox="0 0 1900 980" role="img" aria-labelledby="title desc">
  <title id="title">MERN DevSecOps Architecture</title>
  <desc id="desc">System architecture and CI/CD flow for MERN DevSecOps project using GitHub Actions, AWS ECR, EC2, and MongoDB Atlas.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2937" />
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .section { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 14px Arial, sans-serif; fill: #111827; }
      .small { font: 12px Arial, sans-serif; fill: #374151; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .ci { fill: #eef2ff; stroke: #3730a3; stroke-width: 2; rx: 10; }
      .aws { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 14; }
      .container { fill: #ecfeff; stroke: #0e7490; stroke-width: 2; rx: 10; }
      .db { fill: #ecfdf5; stroke: #047857; stroke-width: 2; rx: 10; }
      .line { stroke: #1f2937; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 6; }
    </style>
  </defs>

  <text x="30" y="45" class="title">MERN DevSecOps Architecture (System + CI/CD + AWS)</text>

  <text x="30" y="95" class="section">Source Control and Trigger</text>
  <rect x="30" y="110" width="180" height="70" class="box" />
  <text x="120" y="140" text-anchor="middle" class="label">Developer</text>
  <text x="120" y="160" text-anchor="middle" class="small">push to main</text>

  <rect x="250" y="110" width="210" height="70" class="box" />
  <text x="355" y="140" text-anchor="middle" class="label">GitHub Repository</text>
  <text x="355" y="160" text-anchor="middle" class="small">Source code + workflow</text>

  <rect x="500" y="110" width="220" height="70" class="box" />
  <text x="610" y="140" text-anchor="middle" class="label">GitHub Actions</text>
  <text x="610" y="160" text-anchor="middle" class="small">Pipeline runner</text>

  <path d="M210 145 L250 145" class="line" />
  <path d="M460 145 L500 145" class="line" />

  <text x="30" y="235" class="section">DevSecOps Pipeline Stages</text>

  <rect x="30" y="250" width="170" height="70" class="ci" />
  <text x="115" y="280" text-anchor="middle" class="label">GitLeaks</text>
  <text x="115" y="300" text-anchor="middle" class="small">Secret scan</text>

  <rect x="230" y="250" width="170" height="70" class="ci" />
  <text x="315" y="280" text-anchor="middle" class="label">SonarCloud</text>
  <text x="315" y="300" text-anchor="middle" class="small">SAST + quality</text>

  <rect x="430" y="250" width="170" height="70" class="ci" />
  <text x="515" y="280" text-anchor="middle" class="label">Build Images</text>
  <text x="515" y="300" text-anchor="middle" class="small">frontend + backend</text>

  <rect x="630" y="250" width="170" height="70" class="ci" />
  <text x="715" y="280" text-anchor="middle" class="label">Trivy Scan</text>
  <text x="715" y="300" text-anchor="middle" class="small">critical gate</text>

  <rect x="830" y="250" width="170" height="70" class="ci" />
  <text x="915" y="280" text-anchor="middle" class="label">Push to ECR</text>
  <text x="915" y="300" text-anchor="middle" class="small">image publish</text>

  <rect x="1030" y="250" width="170" height="70" class="ci" />
  <text x="1115" y="280" text-anchor="middle" class="label">Terraform Apply</text>
  <text x="1115" y="300" text-anchor="middle" class="small">infra provisioning</text>

  <rect x="1230" y="250" width="170" height="70" class="ci" />
  <text x="1315" y="280" text-anchor="middle" class="label">Deploy via SSH</text>
  <text x="1315" y="300" text-anchor="middle" class="small">container rollout</text>

  <path d="M200 285 L230 285" class="line" />
  <path d="M400 285 L430 285" class="line" />
  <path d="M600 285 L630 285" class="line" />
  <path d="M800 285 L830 285" class="line" />
  <path d="M1000 285 L1030 285" class="line" />
  <path d="M1200 285 L1230 285" class="line" />
  <path d="M610 180 L610 250" class="line" />

  <text x="30" y="395" class="section">Runtime System and Cloud</text>

  <rect x="900" y="410" width="860" height="430" class="aws" />
  <text x="930" y="445" class="label">AWS Account</text>

  <rect x="940" y="470" width="260" height="90" class="box" />
  <text x="1070" y="505" text-anchor="middle" class="label">Amazon ECR</text>
  <text x="1070" y="525" text-anchor="middle" class="small">mern-frontend / mern-backend</text>

  <rect x="1240" y="470" width="480" height="330" class="box" />
  <text x="1265" y="500" class="label">EC2 Instance (Ubuntu)</text>
  <text x="1265" y="520" class="small">Provisioned by Terraform</text>

  <rect x="1280" y="560" width="400" height="90" class="container" />
  <text x="1480" y="595" text-anchor="middle" class="label">Frontend Container</text>
  <text x="1480" y="615" text-anchor="middle" class="small">React build served by Nginx :80</text>

  <rect x="1280" y="680" width="400" height="90" class="container" />
  <text x="1480" y="715" text-anchor="middle" class="label">Backend Container</text>
  <text x="1480" y="735" text-anchor="middle" class="small">Node.js + Express API :5000</text>

  <rect x="30" y="550" width="240" height="90" class="box" />
  <text x="150" y="585" text-anchor="middle" class="label">User Browser</text>
  <text x="150" y="605" text-anchor="middle" class="small">HTTP requests</text>

  <rect x="320" y="690" width="300" height="90" class="db" />
  <text x="470" y="725" text-anchor="middle" class="label">MongoDB Atlas</text>
  <text x="470" y="745" text-anchor="middle" class="small">Managed database</text>

  <path d="M1400 320 L1070 470" class="line dashed" />
  <path d="M1315 320 L1460 470" class="line dashed" />

  <path d="M1200 515 L1280 605" class="line" />
  <path d="M1200 515 L1280 725" class="line" />

  <path d="M270 595 L1280 605" class="line" />
  <path d="M1480 650 L1480 680" class="line" />
  <path d="M1280 725 L620 735" class="line" />

  <text x="30" y="900" class="small">Legend: Solid arrows = runtime traffic / deployment actions, Dashed arrows = pipeline outputs to cloud resources.</text>
</svg>
