name: MERN DevSecOps Pipeline

on:
  push:
    branches:
      - main # Run only for pushes to main.

jobs:
  # 1) Secret scanning
  gitleaks_scan:
    name: Secret Scanning with GitLeaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2) SAST and code quality scan
  sonar_scan:
    name: Code Quality Scan
    needs: gitleaks_scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Sonar needs full git history.

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master # Keep current action to preserve existing behavior.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io" # Required for SonarCloud.
        with:
          args: >
            -Dsonar.organization=madupadilshan
            -Dsonar.projectKey=madupadilshan_mern-devops-practice
            -Dsonar.sources=frontend/src,backend/src

  # 3) Build images, scan with Trivy, and push to ECR
  build_scan_push:
    name: Build, Scan and Push to ECR
    needs: sonar_scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Ensure ECR repositories exist
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ecr describe-repositories --repository-names mern-backend --region "$AWS_REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name mern-backend --region "$AWS_REGION"

          aws ecr describe-repositories --repository-names mern-frontend --region "$AWS_REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name mern-frontend --region "$AWS_REGION"

      # --- Backend Image ---
      - name: Build Backend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mern-backend
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend

      - name: Trivy Scan Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/mern-backend:latest'
          format: 'table'
          exit-code: '1' # Fail pipeline if critical issues are found.
          severity: 'CRITICAL'

      - name: Push Backend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mern-backend
          IMAGE_TAG: latest
        run: docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # --- Frontend Image ---
      - name: Build Frontend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mern-frontend
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./frontend

      - name: Trivy Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/mern-frontend:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Push Frontend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mern-frontend
          IMAGE_TAG: latest
        run: docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  # 4) Provision infrastructure with Terraform
  terraform_deploy:
    name: Terraform Apply
    needs: build_scan_push
    runs-on: ubuntu-latest
    # Pass created EC2 IP to the next job.
    outputs:
      EC2_DYNAMIC_IP: ${{ steps.get_ip.outputs.ip }}
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false # Disable wrapper to read raw output values.

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      # Read instance IP from Terraform output.
      - name: Get EC2 IP Address
        id: get_ip
        run: echo "ip=$(terraform output -raw server_public_ip)" >> $GITHUB_OUTPUT

  # 5) Deploy containers to EC2
  deploy_to_ec2:
    name: Deploy to EC2
    needs: terraform_deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for EC2 to initialize and install Docker
        run: sleep 120

      # 1) Configure AWS access on the runner.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 2) Get temporary ECR login password.
      - name: Get ECR Login Password
        id: ecr_auth
        run: echo "password=$(aws ecr get-login-password --region ${{ secrets.AWS_REGION }})" >> $GITHUB_OUTPUT

      # 3) Run deployment commands on the target EC2 host.
      - name: Execute Deploy Commands via SSH
        uses: appleboy/ssh-action@master
        env:
          # Pass secrets as env vars for remote deploy steps.
          ECR_PASSWORD: ${{ steps.ecr_auth.outputs.password }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        with:
          host: ${{ needs.terraform_deploy.outputs.EC2_DYNAMIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_PASSWORD,MONGODB_URI,AWS_ACCOUNT_ID,AWS_REGION
          script: |
            set -e # Stop immediately if any command fails.

            echo "Logging into ECR..."
            echo "$ECR_PASSWORD" | sudo docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

            echo "Stopping old containers..."
            sudo docker stop mern-backend mern-frontend || true
            sudo docker rm mern-backend mern-frontend || true

            echo "Pulling new images..."
            sudo docker pull $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/mern-backend:latest
            sudo docker pull $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/mern-frontend:latest

            echo "Starting backend..."
            sudo docker run -d --name mern-backend -p 5000:5000 -e MONGODB_URI="$MONGODB_URI" $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/mern-backend:latest

            echo "Starting frontend..."
            sudo docker run -d --name mern-frontend -p 80:80 $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/mern-frontend:latest

            echo "Cleaning up..."
            sudo docker image prune -f
