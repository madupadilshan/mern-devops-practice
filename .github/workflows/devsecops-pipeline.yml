name: MERN DevSecOps Pipeline

on:
  push:
    branches:
      - main # main branch එකට push කළ විට පමණක් මෙය ක්‍රියාත්මක වේ

jobs:
  # -----------------------------------------------------
  # 1. GitLeaks (Secret Scanning)
  # -----------------------------------------------------
  gitleaks_scan:
    name: Secret Scanning with GitLeaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -----------------------------------------------------
  # 2. SonarQube / SonarCloud (SAST - Code Quality)
  # -----------------------------------------------------
  sonar_scan:
    name: Code Quality Scan
    needs: gitleaks_scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # SonarQube වලට සම්පූර්ණ ඉතිහාසය අවශ්‍යයි

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master # Warning එක නැති කිරීමට අලුත් Action එක
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io" # මෙය අනිවාර්යයි
        with:
          args: >
            -Dsonar.organization=madupadilshan
            -Dsonar.projectKey=madupadilshan_mern-devops-practice
            -Dsonar.sources=frontend/src,backend/src

  # -----------------------------------------------------
  # 3. Docker Build, Trivy Scan, and Push to AWS ECR
  # -----------------------------------------------------
  build_scan_push:
    name: Build, Scan and Push to ECR
    needs: sonar_scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Ensure ECR repositories exist
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ecr describe-repositories --repository-names mern-backend --region "$AWS_REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name mern-backend --region "$AWS_REGION"

          aws ecr describe-repositories --repository-names mern-frontend --region "$AWS_REGION" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name mern-frontend --region "$AWS_REGION"

      # --- Backend Image ---
      - name: Build Backend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mern-backend
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend

      - name: Trivy Scan Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/mern-backend:latest'
          format: 'table'
          exit-code: '1' # අවදානමක් ඇත්නම් Pipeline එක fail කරයි
          severity: 'CRITICAL'

      - name: Push Backend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mern-backend
          IMAGE_TAG: latest
        run: docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # --- Frontend Image ---
      - name: Build Frontend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mern-frontend
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./frontend

      - name: Trivy Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/mern-frontend:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Push Frontend Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mern-frontend
          IMAGE_TAG: latest
        run: docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  # -----------------------------------------------------
  # 4. Terraform Apply (Infrastructure Provisioning)
  # -----------------------------------------------------
  terraform_deploy:
    name: Terraform Apply
    needs: build_scan_push
    runs-on: ubuntu-latest
    # මීළඟ Job එකට IP එක pass කිරීම සඳහා outputs සෑදීම
    outputs:
      EC2_DYNAMIC_IP: ${{ steps.get_ip.outputs.ip }}
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # --- මෙන්න මෙතනයි අලුතින් වෙනස් කළේ ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false # IP එක නිවැරදිව ලබාගැනීමට Wrapper එක අක්‍රිය කිරීම
      # ------------------------------------

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        env:
          TF_VAR_key_name: ${{ secrets.EC2_KEY_PAIR_NAME }}
        run: terraform apply -auto-approve

      # Terraform වලින් අලුත් IP එක ලබාගෙන එය GitHub Output එකක් බවට පත් කිරීම
      - name: Get EC2 IP Address
        id: get_ip
        run: echo "ip=$(terraform output -raw server_public_ip)" >> $GITHUB_OUTPUT

  # -----------------------------------------------------
  # 5. Deploy to EC2 Instance (Using Dynamic IP)
  # -----------------------------------------------------
  deploy_to_ec2:
    name: Deploy to EC2
    needs: terraform_deploy
    runs-on: ubuntu-latest
    steps:
      # සර්වර් එක on වී Docker install වන තුරු තත්පර 120ක් රැඳී සිටීම
      - name: Wait for EC2 to initialize and install Docker
        run: sleep 120

      - name: Execute Deploy Commands via SSH
        uses: appleboy/ssh-action@master
        with:
          # කලින් Job එකෙන් ආපු අලුත්ම IP එක මෙතනට ස්වයංක්‍රීයව ලැබේ!
          host: ${{ needs.terraform_deploy.outputs.EC2_DYNAMIC_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | sudo docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            sudo docker stop mern-backend mern-frontend || true
            sudo docker rm mern-backend mern-frontend || true

            sudo docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/mern-backend:latest
            sudo docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/mern-frontend:latest

            sudo docker run -d --name mern-backend -p 5000:5000 -e MONGODB_URI="${{ secrets.MONGODB_URI }}" ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/mern-backend:latest
            sudo docker run -d --name mern-frontend -p 80:80 ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/mern-frontend:latest

            sudo docker image prune -f
