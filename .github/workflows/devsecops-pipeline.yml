name: MERN DevSecOps Pipeline

# මේ රොබෝ (Pipeline එක) වැඩ කරන්න පටන් ගන්නේ කොයි වෙලාවටද?
# 'main' කියන බ්‍රාන්ච් එකට අලුත් කේතයක් push කරපු ගමන් මේක වැඩ කරනවා.
on:
  push:
    branches: [ "main" ]

# Jobs කියන්නේ රොබෝට කරන්න තියෙන ප්‍රධාන රාජකාරි ටික
jobs:

  # ---------------------------------------------------------
  # රාජකාරිය 1: කේතය ස්කෑන් කිරීම (Security Scanning)
  # ---------------------------------------------------------
  security_scanning:
    name: Code Security Scans
    runs-on: ubuntu-latest # මේක දුවන්නේ GitHub ලා දෙන Ubuntu පරිගණකයක
    steps:
      - name: Checkout Code # මුලින්ම ඔයාගේ කේතය ඒ පරිගණකයට ඩවුන්ලෝඩ් කරගන්නවා
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # GitLeaks: කේතය ඇතුලේ වැරදීමකින්වත් Passwords හෝ API Keys තියෙනවද කියලා හොයනවා
      - name: GitLeaks Scan
        uses: zricethezav/gitleaks-action@master

      # SonarQube (SonarCloud): කේතයේ ගුණාත්මකභාවය (Code Quality) සහ දුර්වලතා බලනවා
      # [වෙනස් කරන ලද කොටස - අලුත් Action එක මෙහි යොදා ඇත]
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHub එකෙන් ඉබේම දෙන token එකක්
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}   # ඔයා කලින් සේප්පුවේ දාපු Sonar Token එක

  # ---------------------------------------------------------
  # රාජකාරිය 2: Docker Images සෑදීම සහ ස්කෑන් කිරීම
  # ---------------------------------------------------------
  build_and_scan_containers:
    name: Build & Scan Docker Images
    needs: security_scanning # වැදගත්: 1 වෙනි රාජකාරිය සාර්ථකව ඉවර උනොත් විතරක් මේකට එන්න
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # අපි කලින් හදපු Dockerfiles පාවිච්චි කරලා Images හදනවා
      - name: Build Backend Image
        run: docker build -t my-mern-backend:latest ./backend

      - name: Build Frontend Image
        run: docker build -t my-mern-frontend:latest ./frontend

      # Trivy: හදපු Backend Docker Image එකේ OS එකේ හෝ Libraries වල දෝෂ තියෙනවද බලනවා
      - name: Trivy Scan (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-mern-backend:latest'
          format: 'table'
          exit-code: '0' # පුහුණුවීමක් නිසා දෝෂ ආවත් pipeline එක නවත්තන්නේ නෑ
          severity: 'CRITICAL,HIGH'

      # Trivy: Frontend Docker Image එකත් ස්කෑන් කරනවා
      - name: Trivy Scan (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-mern-frontend:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      # ස්කෑන් කරලා ඉවර උනාට පස්සේ Docker Hub එකට ලොග් වෙනවා (සේප්පුවේ තියෙන රහස් පාවිච්චි කරලා)
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Images ටික Docker Hub එකට Upload (Push) කරනවා
      - name: Push Images to Docker Hub
        run: |
          docker tag my-mern-backend:latest ${{ secrets.DOCKERHUB_USERNAME }}/my-mern-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-mern-backend:latest

          docker tag my-mern-frontend:latest ${{ secrets.DOCKERHUB_USERNAME }}/my-mern-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-mern-frontend:latest

  # ---------------------------------------------------------
  # රාජකාරිය 3: Terraform මගින් AWS සර්වර් එක හැදීම
  # ---------------------------------------------------------
  deploy_aws_infrastructure:
    name: Deploy to AWS via Terraform
    needs: build_and_scan_containers # 2 වෙනි රාජකාරිය සාර්ථක උනොත් විතරක් මේකට එන්න
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # GitHub පරිගණකයට Terraform ස්ථාපනය කරනවා
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      # Terraform විධානයන් ධාවනය කරලා AWS එකේ සර්වර් එක හදනවා
      - name: Terraform Init and Apply
        working-directory: ./terraform
        env: # සේප්පුවේ තියෙන AWS රහස් මෙතනට දෙනවා
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init
          terraform apply -auto-approve
