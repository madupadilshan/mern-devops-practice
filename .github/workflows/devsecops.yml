name: MERN DevSecOps CI Pipeline

# කේතය main branch එකට Push කළ වහාම මෙය ස්වයංක්‍රීයව ධාවනය වේ
on:
  push:
    branches: [ "main" ]

jobs:
  # --- 1. SAST ස්කෑන් කිරීම (Semgrep භාවිතයෙන්) ---
  sast-scan:
    name: Run SAST Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Semgrep Security Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/javascript"

  # --- 2. Build, Trivy Scan සහ Push කිරීම ---
  build-scan-and-push:
    name: Build, Trivy Scan & Push to Docker Hub
    needs: sast-scan # SAST එක පාස් වුණොත් විතරක් මේක වැඩ කරයි
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2.1 - Backend Image එක සෑදීම
      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest ./backend

      # 2.2 - Trivy හරහා Backend Image එක ස්කෑන් කිරීම
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/mern-backend:latest'
          format: 'table'
          # CRITICAL දෝෂයක් ආවොත් Pipeline එක Fail කරන්න
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      # 2.3 - Docker Hub එකට ලොග් වීම (ඔබ ලබාදුන් Secrets හරහා)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 2.4 - Backend එක Docker Hub එකට යැවීම
      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest

      # 2.5 - Frontend එක සෑදීම සහ යැවීම
      - name: Build and Push Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest
